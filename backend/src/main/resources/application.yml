server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/parcel_pickup?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: parcelPickupSecretKey2024ThisIsASecretKeyForJwtTokenGeneration
  expiration: 86400000

logging:
  level:
    com.parcelpickup: debug
    org.hibernate.SQL: debug

mybatis:
  configuration:
    map-underscore-to-camel-case: true
