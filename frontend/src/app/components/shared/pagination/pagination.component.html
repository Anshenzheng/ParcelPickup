<div class="pagination-container" *ngIf="pageResult && totalPages > 1">
  <div class="pagination-info">
    共 {{ totalElements }} 条记录，第 {{ currentPage + 1 }} / {{ totalPages }} 页
  </div>
  <div class="pagination">
    <button (click)="goToFirst()" [disabled]="isFirst" title="第一页">
      ««
    </button>
    <button (click)="goToPrev()" [disabled]="isFirst" title="上一页">
      «
    </button>
    
    <button 
      *ngFor="let page of pages"
      (click)="goToPage(page)"
      [class.active]="page === currentPage">
      {{ page + 1 }}
    </button>
    
    <button (click)="goToNext()" [disabled]="isLast" title="下一页">
      »
    </button>
    <button (click)="goToLast()" [disabled]="isLast" title="最后一页">
      »»
    </button>
  </div>
</div>
