<div class="auth-container">
  <div class="auth-card card">
    <div class="auth-header">
      <h1 class="auth-title">创建账户</h1>
      <p class="auth-subtitle">注册成为校园快递代取系统的一员</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>
      <div *ngIf="success" class="alert alert-success">
        {{ success }}
      </div>

      <div class="grid grid-2">
        <div class="form-group">
          <label class="form-label">用户名 <span class="required">*</span></label>
          <input 
            type="text" 
            formControlName="username" 
            class="form-control"
            [class.invalid]="f['username'].touched && f['username'].invalid"
            placeholder="请输入用户名"
          >
          <div *ngIf="f['username'].touched && f['username'].invalid" class="form-error">
            <span *ngIf="f['username'].errors?.['required']">不能为空</span>
            <span *ngIf="f['username'].errors?.['minlength']">至少3个字符</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">邮箱 <span class="required">*</span></label>
          <input 
            type="email" 
            formControlName="email" 
            class="form-control"
            [class.invalid]="f['email'].touched && f['email'].invalid"
            placeholder="请输入邮箱"
          >
          <div *ngIf="f['email'].touched && f['email'].invalid" class="form-error">
            <span *ngIf="f['email'].errors?.['required']">不能为空</span>
            <span *ngIf="f['email'].errors?.['email']">邮箱格式不正确</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">密码 <span class="required">*</span></label>
          <input 
            type="password" 
            formControlName="password" 
            class="form-control"
            [class.invalid]="f['password'].touched && f['password'].invalid"
            placeholder="请输入密码"
          >
          <div *ngIf="f['password'].touched && f['password'].invalid" class="form-error">
            <span *ngIf="f['password'].errors?.['required']">不能为空</span>
            <span *ngIf="f['password'].errors?.['minlength']">至少6个字符</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">确认密码 <span class="required">*</span></label>
          <input 
            type="password" 
            formControlName="confirmPassword" 
            class="form-control"
            [class.invalid]="f['confirmPassword'].touched && (f['confirmPassword'].invalid || registerForm.errors?.['passwordMismatch'])"
            placeholder="请再次输入密码"
          >
          <div *ngIf="f['confirmPassword'].touched && (f['confirmPassword'].errors || registerForm.errors?.['passwordMismatch'])" class="form-error">
            <span *ngIf="f['confirmPassword'].errors?.['required']">不能为空</span>
            <span *ngIf="registerForm.errors?.['passwordMismatch']">两次密码不一致</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">手机号</label>
          <input 
            type="tel" 
            formControlName="phone" 
            class="form-control"
            [class.invalid]="f['phone'].touched && f['phone'].invalid"
            placeholder="请输入手机号"
          >
          <div *ngIf="f['phone'].touched && f['phone'].invalid" class="form-error">
            <span *ngIf="f['phone'].errors?.['pattern']">手机号格式不正确</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">学号</label>
          <input 
            type="text" 
            formControlName="studentId" 
            class="form-control"
            placeholder="请输入学号"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">真实姓名</label>
        <input 
          type="text" 
          formControlName="realName" 
          class="form-control"
          placeholder="请输入真实姓名"
        >
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading || registerForm.invalid">
        <span *ngIf="!loading">注册</span>
        <span *ngIf="loading" class="loading-text">注册中...</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>已有账户？<a routerLink="/login">立即登录</a></p>
    </div>
  </div>
</div>
