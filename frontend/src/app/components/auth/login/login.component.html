<div class="auth-container">
  <div class="auth-card card">
    <div class="auth-header">
      <h1 class="auth-title">欢迎回来</h1>
      <p class="auth-subtitle">登录您的校园快递代取账户</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <div class="form-group">
        <label class="form-label">用户名</label>
        <input 
          type="text" 
          formControlName="username" 
          class="form-control"
          [class.invalid]="f['username'].touched && f['username'].invalid"
          placeholder="请输入用户名"
        >
        <div *ngIf="f['username'].touched && f['username'].invalid" class="form-error">
          <span *ngIf="f['username'].errors?.['required']">用户名不能为空</span>
          <span *ngIf="f['username'].errors?.['minlength']">用户名至少3个字符</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <input 
          type="password" 
          formControlName="password" 
          class="form-control"
          [class.invalid]="f['password'].touched && f['password'].invalid"
          placeholder="请输入密码"
        >
        <div *ngIf="f['password'].touched && f['password'].invalid" class="form-error">
          <span *ngIf="f['password'].errors?.['required']">密码不能为空</span>
          <span *ngIf="f['password'].errors?.['minlength']">密码至少6个字符</span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading || loginForm.invalid">
        <span *ngIf="!loading">登录</span>
        <span *ngIf="loading" class="loading-text">登录中...</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>还没有账户？<a routerLink="/register">立即注册</a></p>
    </div>

    <div class="test-accounts">
      <p class="test-title">测试账户：</p>
      <p class="test-info">管理员: admin / admin123</p>
    </div>
  </div>
</div>
